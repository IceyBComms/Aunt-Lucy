openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pages
    description: Support page operations
  - name: slots
    description: Slot operations
  - name: gifts
    description: Gift experience operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pages/{slug}:
    get:
      operationId: getSupportPage
      tags: [pages]
      summary: Get a support page by slug
      description: Returns page details and all slots. For PIN-protected pages, requires the PIN to be passed as a query parameter.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: pin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Support page found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportPageWithSlots"
        "401":
          description: PIN required or incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "404":
          description: Page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /slots/{slotId}/claim:
    post:
      operationId: claimSlot
      tags: [slots]
      summary: Claim a slot
      description: Claim an open slot. Returns 409 if already claimed.
      parameters:
        - name: slotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSlotRequest"
      responses:
        "200":
          description: Slot claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotResponse"
        "401":
          description: PIN required or incorrect (for PIN-protected pages)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "409":
          description: Slot already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"
        "404":
          description: Slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /gifts/{token}:
    get:
      operationId: getGiftExperience
      tags: [gifts]
      summary: Get a gift experience by its redemption token
      description: Returns the gift experience payload (recipient, gifter, note and colleague signings) for the unguessable redemption token. Returns 404 when the token does not match a gift.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gift found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftExperienceResponse"
        "404":
          description: Gift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SlotType:
      type: string
      enum:
        - meal
        - school_pickup
        - errand
        - dog_walking
        - shopping
        - visit
        - other

    SlotResponse:
      type: object
      properties:
        id:
          type: string
        pageId:
          type: string
        slotType:
          $ref: "#/components/schemas/SlotType"
        customLabel:
          type: string
          nullable: true
        slotDate:
          type: string
        slotTime:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isClaimed:
          type: boolean
        claimedByName:
          type: string
          nullable: true
        claimedNote:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - pageId
        - slotType
        - slotDate
        - isClaimed
        - createdAt

    SupportPageWithSlots:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        recipientName:
          type: string
        situationDescription:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, pending_approval, active, closed]
        privacy:
          type: string
          enum: [open, pin_protected]
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotResponse"
      required:
        - id
        - slug
        - recipientName
        - status
        - privacy
        - slots

    ClaimSlotRequest:
      type: object
      properties:
        firstName:
          type: string
        contact:
          type: string
        note:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
          description: Required when claiming a slot on a PIN-protected page.
      required:
        - firstName
        - contact

    PinRequiredError:
      type: object
      properties:
        error:
          type: string
        pinRequired:
          type: boolean
      required:
        - error
        - pinRequired

    NotFoundError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ConflictError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    GiftOccasion:
      type: string
      enum:
        - new_baby
        - illness_recovery
        - bereavement
        - ongoing_support
        - other

    GiftStatus:
      type: string
      enum:
        - pending
        - paid
        - delivered
        - redeemed
        - refunded
        - failed
        - cancelled

    GiftSigningResponse:
      type: object
      properties:
        signerName:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - signerName
        - message
        - createdAt

    GiftExperienceResponse:
      type: object
      properties:
        recipientName:
          type: string
        purchaserName:
          type: string
        giftedByNote:
          type: string
          nullable: true
        occasion:
          $ref: "#/components/schemas/GiftOccasion"
          nullable: true
        status:
          $ref: "#/components/schemas/GiftStatus"
        redeemedAt:
          type: string
          nullable: true
        signings:
          type: array
          items:
            $ref: "#/components/schemas/GiftSigningResponse"
      required:
        - recipientName
        - purchaserName
        - status
        - signings
