openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pages
    description: Support page operations
  - name: slots
    description: Slot operations
  - name: gifts
    description: Gift experience operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pages/{slug}:
    get:
      operationId: getSupportPage
      tags: [pages]
      summary: Get a support page by slug
      description: Returns page details and all slots. For PIN-protected pages, requires the PIN to be passed as a query parameter.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: pin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Support page found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportPageWithSlots"
        "401":
          description: PIN required or incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "404":
          description: Page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /slots/{slotId}/claim:
    post:
      operationId: claimSlot
      tags: [slots]
      summary: Claim a slot
      description: Claim an open slot. Returns 409 if already claimed.
      parameters:
        - name: slotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSlotRequest"
      responses:
        "200":
          description: Slot claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotResponse"
        "401":
          description: PIN required or incorrect (for PIN-protected pages)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "409":
          description: Slot already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"
        "404":
          description: Slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /gift-tiers:
    get:
      operationId: listGiftTiers
      tags: [gifts]
      summary: List the gift tiers
      description: >-
        Returns every tier shown on the purchase page, including the ones that
        cannot be bought yet. Prices are GST-inclusive cents and come from the
        server so the buyer-facing price can never drift from what Stripe
        charges. A tier with sellable=false is display-only — it carries no
        payment link and POST /gifts refuses it.
      responses:
        "200":
          description: The gift tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftTier"

  /gifts:
    post:
      operationId: createGift
      tags: [gifts]
      summary: Start a gift purchase
      description: >-
        Creates the gift in `pending` status and returns the Stripe checkout URL
        to send the buyer to. The URL already carries `client_reference_id` set
        to the new gift's id — that is the handshake the Stripe webhook uses to
        match the payment back to this gift, so the caller must redirect to the
        returned URL unchanged. Nothing is charged and nothing is emailed until
        the payment completes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGiftRequest"
      responses:
        "201":
          description: Gift created and ready for payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGiftResponse"
        "400":
          description: Missing details, or a tier that cannot be bought
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /gifts/{redemptionToken}:
    get:
      operationId: getGift
      tags: [gifts]
      summary: Get a gift experience by redemption token
      description: >-
        Returns the recipient-facing gift experience — recipient name, the
        organisation's message, who it was gifted by, the occasion, and all
        colleague signings. The gift is shown even before it has been delivered.
      parameters:
        - name: redemptionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gift found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftExperience"
        "404":
          description: Gift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SlotType:
      type: string
      enum:
        - meal
        - school_pickup
        - errand
        - dog_walking
        - shopping
        - visit
        - other

    SlotResponse:
      type: object
      properties:
        id:
          type: string
        pageId:
          type: string
        slotType:
          $ref: "#/components/schemas/SlotType"
        customLabel:
          type: string
          nullable: true
        slotDate:
          type: string
        slotTime:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isClaimed:
          type: boolean
        claimedByName:
          type: string
          nullable: true
        claimedNote:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - pageId
        - slotType
        - slotDate
        - isClaimed
        - createdAt

    SupportPageWithSlots:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        recipientName:
          type: string
        situationDescription:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, pending_approval, active, closed]
        privacy:
          type: string
          enum: [open, pin_protected]
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotResponse"
      required:
        - id
        - slug
        - recipientName
        - status
        - privacy
        - slots

    ClaimSlotRequest:
      type: object
      properties:
        firstName:
          type: string
        contact:
          type: string
        note:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
          description: Required when claiming a slot on a PIN-protected page.
      required:
        - firstName
        - contact

    GiftOccasion:
      type: string
      enum:
        - new_baby
        - illness_recovery
        - bereavement
        - ongoing_support
        - other

    GiftTierId:
      type: string
      enum:
        - consumer_personal
        - workplace_individual
        - workplace_5pack
        - workplace_10pack

    GiftTier:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/GiftTierId"
        label:
          type: string
          description: The buyer-facing name of the tier.
        blurb:
          type: string
          description: One line explaining who the tier is for.
        amountCents:
          type: integer
          description: GST-inclusive price in cents.
        gifts:
          type: integer
          description: How many separate gift pages the tier buys.
        sellable:
          type: boolean
          description: >-
            False for the pack tiers, which are shown as coming soon until
            multi-gift fulfilment exists. A display-only tier has no payment
            link and cannot be purchased.
      required:
        - id
        - label
        - blurb
        - amountCents
        - gifts
        - sellable

    CreateGiftRequest:
      type: object
      properties:
        tierId:
          $ref: "#/components/schemas/GiftTierId"
        purchaserName:
          type: string
        purchaserEmail:
          type: string
          description: Where the receipt and the tax invoice are sent.
        forSelf:
          type: boolean
          description: >-
            True when the buyer is setting the page up for themselves. The
            recipient fields are then ignored and the buyer's own name and email
            are used.
        recipientName:
          type: string
          nullable: true
          description: Required unless forSelf is true.
        recipientEmail:
          type: string
          nullable: true
          description: >-
            Where the gift is delivered. Null when the buyer chose to pass the
            link on themselves — fulfilment then sends the link to the buyer
            instead and nothing reaches the recipient automatically.
        occasion:
          oneOf:
            - $ref: "#/components/schemas/GiftOccasion"
          nullable: true
        giftedByNote:
          type: string
          nullable: true
          description: The optional "from" note shown on the delivered gift.
        deliverAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            When the gift should reach the recipient. Null means as soon as the
            payment clears.
      required:
        - tierId
        - purchaserName
        - purchaserEmail
        - forSelf

    CreateGiftResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
          description: >-
            The Stripe payment link with client_reference_id already appended.
            Redirect to it unchanged.
      required:
        - checkoutUrl

    GiftSigningPublic:
      type: object
      properties:
        signerName:
          type: string
        message:
          type: string
      required:
        - signerName
        - message

    GiftExperience:
      type: object
      properties:
        recipientName:
          type: string
        organisationMessage:
          type: string
          nullable: true
          description: The organisation's / gifter's message (from gifted_by_note).
        giftedBy:
          type: string
          description: Who the gift is from (the purchaser's name).
        occasion:
          oneOf:
            - $ref: "#/components/schemas/GiftOccasion"
          nullable: true
        signings:
          type: array
          items:
            $ref: "#/components/schemas/GiftSigningPublic"
      required:
        - recipientName
        - giftedBy
        - signings

    PinRequiredError:
      type: object
      properties:
        error:
          type: string
        pinRequired:
          type: boolean
      required:
        - error
        - pinRequired

    ValidationError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NotFoundError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ConflictError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
