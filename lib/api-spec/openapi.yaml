openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pages
    description: Support page operations
  - name: slots
    description: Slot operations
  - name: gifts
    description: Gift experience operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pages/{slug}:
    get:
      operationId: getSupportPage
      tags: [pages]
      summary: Get a support page by slug
      description: Returns page details and all slots. For PIN-protected pages, requires the PIN to be passed as a query parameter.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: pin
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Support page found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportPageWithSlots"
        "401":
          description: PIN required or incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "404":
          description: Page not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /slots/{slotId}/claim:
    post:
      operationId: claimSlot
      tags: [slots]
      summary: Claim a slot
      description: Claim an open slot. Returns 409 if already claimed.
      parameters:
        - name: slotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimSlotRequest"
      responses:
        "200":
          description: Slot claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotResponse"
        "401":
          description: PIN required or incorrect (for PIN-protected pages)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinRequiredError"
        "409":
          description: Slot already claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictError"
        "404":
          description: Slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /gifts/{redemptionToken}:
    get:
      operationId: getGift
      tags: [gifts]
      summary: Get a gift experience by redemption token
      description: >-
        Returns the recipient-facing gift experience — recipient name, the
        organisation's message, who it was gifted by, the occasion, and all
        colleague signings. The gift is shown even before it has been delivered.
      parameters:
        - name: redemptionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gift found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftExperience"
        "404":
          description: Gift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /gifts/{redemptionToken}/review:
    get:
      operationId: getGiftReview
      tags: [gifts]
      summary: Get the suggested tasks a recipient can steer before activating
      description: >-
        Token-gated, not auth-gated — the recipient has no account. Before
        activation this returns occasion-aware suggested tasks that are
        generated on the fly and not persisted. After activation it returns the
        live page instead, so re-opening the link is always safe.
      parameters:
        - name: redemptionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gift found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftReview"
        "404":
          description: Gift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /gifts/{redemptionToken}/activate:
    post:
      operationId: activateGift
      tags: [gifts]
      summary: Turn the kept tasks into a live support page
      description: >-
        Creates the support page (with no organiser account), creates the kept
        tasks as slots, and marks the gift redeemed. Returns the page slug.
        Calling this again on an already-activated gift returns the existing
        page rather than an error.
      parameters:
        - name: redemptionToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateGiftRequest"
      responses:
        "200":
          description: Gift was already activated; the existing page is returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivatedPage"
        "201":
          description: Support page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivatedPage"
        "404":
          description: Gift not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "409":
          description: Gift is not in a state that can be activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SlotType:
      type: string
      enum:
        - meal
        - school_pickup
        - child_care
        - errand
        - dog_walking
        - shopping
        - visit
        - other

    SlotResponse:
      type: object
      properties:
        id:
          type: string
        pageId:
          type: string
        slotType:
          $ref: "#/components/schemas/SlotType"
        customLabel:
          type: string
          nullable: true
        slotDate:
          type: string
          nullable: true
          description: >-
            Null means the task has no fixed date — a flexible offer, claimed
            whenever suits. The date is set when a helper claims it.
        slotTime:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isClaimed:
          type: boolean
        claimedByName:
          type: string
          nullable: true
        claimedNote:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - pageId
        - slotType
        - isClaimed
        - createdAt

    SupportPageWithSlots:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        recipientName:
          type: string
        situationDescription:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, pending_approval, active, closed]
        privacy:
          type: string
          enum: [open, pin_protected]
        goodToKnow:
          type: string
          nullable: true
          description: >-
            An optional free-text note from the recipient, shown to every
            helper. Null when they didn't leave one.
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotResponse"
      required:
        - id
        - slug
        - recipientName
        - status
        - privacy
        - slots

    ClaimSlotRequest:
      type: object
      properties:
        firstName:
          type: string
        contact:
          type: string
        note:
          type: string
          nullable: true
        pin:
          type: string
          nullable: true
          description: Required when claiming a slot on a PIN-protected page.
      required:
        - firstName
        - contact

    GiftOccasion:
      type: string
      enum:
        - new_baby
        - illness_recovery
        - bereavement
        - ongoing_support
        - other

    GiftSigningPublic:
      type: object
      properties:
        signerName:
          type: string
        message:
          type: string
      required:
        - signerName
        - message

    GiftExperience:
      type: object
      properties:
        recipientName:
          type: string
        organisationMessage:
          type: string
          nullable: true
          description: The organisation's / gifter's message (from gifted_by_note).
        giftedBy:
          type: string
          description: Who the gift is from (the purchaser's name).
        occasion:
          oneOf:
            - $ref: "#/components/schemas/GiftOccasion"
          nullable: true
        signings:
          type: array
          items:
            $ref: "#/components/schemas/GiftSigningPublic"
      required:
        - recipientName
        - giftedBy
        - signings

    SuggestedTask:
      type: object
      description: >-
        A proposed task shown on the review screen. Not persisted — it becomes a
        slot only if the recipient keeps it and activates.
      properties:
        key:
          type: string
        slotType:
          $ref: "#/components/schemas/SlotType"
        label:
          type: string
        dated:
          type: boolean
          description: >-
            When false the card shows no date at all — a flexible offer. Most
            suggestions are undated by design.
        trustedHelpersOnly:
          type: boolean
      required:
        - key
        - slotType
        - label
        - dated
        - trustedHelpersOnly

    GiftReview:
      type: object
      properties:
        activated:
          type: boolean
          description: >-
            True once the recipient has activated. The suggestions list is then
            empty and slug points at the live page.
        recipientName:
          type: string
        giftedBy:
          type: string
          nullable: true
        occasion:
          oneOf:
            - $ref: "#/components/schemas/GiftOccasion"
          nullable: true
        canActivate:
          type: boolean
          nullable: true
          description: False while the gift is unpaid or cancelled.
        slug:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        scheduledActivateAt:
          type: string
          nullable: true
          description: Set when the recipient chose a future go-live date.
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestedTask"
      required:
        - activated
        - recipientName
        - suggestions

    ActivateGiftTask:
      type: object
      properties:
        slotType:
          $ref: "#/components/schemas/SlotType"
        label:
          type: string
        slotDate:
          type: string
          nullable: true
          description: Omit or null for a flexible, undated task.
        notes:
          type: string
          nullable: true
        trustedHelpersOnly:
          type: boolean
      required:
        - slotType
        - label

    ActivateGiftRequest:
      type: object
      properties:
        tasks:
          type: array
          description: The tasks the recipient kept, in the wording they kept them in.
          items:
            $ref: "#/components/schemas/ActivateGiftTask"
        scheduledActivateAt:
          type: string
          nullable: true
          description: >-
            Omit to go live now. Supply a future ISO timestamp to create the
            page as a draft that the scheduler makes visible on that date.
        goodToKnow:
          type: string
          nullable: true
          description: >-
            Optional free-text note shown to every helper on the live page.
            Trimmed and capped server-side; omit or null for none.
      required:
        - tasks

    ActivatedPage:
      type: object
      properties:
        slug:
          type: string
        status:
          type: string
        scheduledActivateAt:
          type: string
          nullable: true
      required:
        - slug
        - status

    PinRequiredError:
      type: object
      properties:
        error:
          type: string
        pinRequired:
          type: boolean
      required:
        - error
        - pinRequired

    NotFoundError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ConflictError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
