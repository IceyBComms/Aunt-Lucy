kind = "web"
previewPath = "/"
title = "Rally"
version = "1.0.0"
id = "artifacts/rally"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21112

[services.development]
run = "pnpm --filter @workspace/rally run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rally", "run", "build" ]
publicDir = "artifacts/rally/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21112"
BASE_PATH = "/"
